name: Daily Triangle Headlines

on:
  schedule:
    - cron: '0 13 * * *'     # Runs every day at 1:00 PM UTC (9 AM EST / 6 AM PST)
  workflow_dispatch:         # Allows you to run it manually for testing

jobs:
  post-headlines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Daily Headlines Bot
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: python daily_headlines.py
