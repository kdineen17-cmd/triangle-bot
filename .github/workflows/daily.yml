name: Daily Triangle Headlines

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # This silences the warning immediately

on:
  workflow_dispatch:        # Allows manual run
  schedule:
    - cron: '0 13 * * *'    # Daily at 1 PM UTC

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # v4 is still fine and now supports Node 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Triangle Emporium Bot
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: python daily_headlines.py
